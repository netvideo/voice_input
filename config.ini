; Windows语音输入客户端配置文件
; 修改后重启程序生效

[server]
; ASR服务提供商: local (本地) 或 ali (阿里云)
; local: 使用本地Qwen3-ASR服务器
; ali: 使用阿里云智能语音交互服务
provider = local

; 本地ASR服务器WebSocket地址 (当provider=local时使用)
; ws_url = wss://your-asr-server.com/asr/v1/stream

;ws_url = ws://localhost:8765
ws_url = ws://127.0.0.1:8765
;ws_url = ws://localhost:8765/asr/v1/stream

; 阿里云智能语音交互配置 (当provider=ali时使用)
; 获取方式: https://help.aliyun.com/zh/isi/overview-of-obtaining-an-access-token
ali_token = 
ali_appkey = 

; 阿里云网关地址 (一般不需要修改)
ali_gateway = wss://nls-gateway-cn-shanghai.aliyuncs.com/ws/v1

; 语言设置 (Qwen3-ASR 支持的语言):
; auto          - 自动检测语言
; zh / Chinese  - 中文
; en / English  - 英语
; yue / Cantonese - 粤语
; ja / Japanese - 日语
; ko / Korean   - 韩语
; ar / Arabic   - 阿拉伯语
; de / German   - 德语
; fr / French   - 法语
; es / Spanish  - 西班牙语
; pt / Portuguese - 葡萄牙语
; id / Indonesian - 印尼语
; it / Italian  - 意大利语
; ru / Russian  - 俄语
; th / Thai     - 泰语
; vi / Vietnamese - 越南语
; tr / Turkish  - 土耳其语
; hi / Hindi    - 印地语
; ms / Malay    - 马来语
; nl / Dutch    - 荷兰语
; sv / Swedish  - 瑞典语
; da / Danish   - 丹麦语
; fi / Finnish  - 芬兰语
; pl / Polish   - 波兰语
; cs / Czech    - 捷克语
; tl / Filipino - 菲律宾语
; fa / Persian  - 波斯语
; el / Greek    - 希腊语
; ro / Romanian - 罗马尼亚语
; hu / Hungarian - 匈牙利语
; mk / Macedonian - 马其顿语
language = zh

; 是否启用标点符号: true 或 false
enable_punctuation = true

; 是否启用ITN数字转换(中文数字转阿拉伯数字): true 或 false
enable_itn = true

[trigger]
; 触发方式: mouse(鼠标), keyboard(键盘), 或 touchpad(触摸板)
;type = mouse
type = keyboard

; 触发按键:
; - mouse类型: middle(中键), x1(侧键-后退), x2(侧键-前进), left(左键), right(右键)
; - keyboard类型: caps_lock, ctrl_l(左Ctrl), ctrl_r(右Ctrl), alt_l(左Alt), alt_r(右Alt), 
;                 shift_l(左Shift), shift_r(右Shift), f1-f12等
;button = middle
button = ctrl_r

; 长按阈值(毫秒)，按住超过此时间开始录音
hold_threshold_ms = 500

[touchpad]
; 触摸板专用配置（仅当 trigger.type = touchpad 时有效）

; 启用手势类型: single, double, triple, quadruple, edge_swipe
gesture = triple

; 边缘轻扫设置
edge_swipe_enabled = false
edge_swipe_width = 50

; 触摸板长按阈值(毫秒)，通常比鼠标更短以获得更好体验
hold_threshold_ms = 300

[input]
; 是否使用剪贴板输入中文(推荐开启): true 或 false
use_clipboard = true

; 是否显示中间识别结果: true 或 false
show_intermediate = false

; ==================== 智能上屏配置 ====================

; ==================== 智能窗口检测配置 ====================

; 终端窗口 - 优先级: 进程名 > 类名 > 标题关键词

; 终端进程名 (高优先级检查)
terminal_processes = powershell.exe, pwsh.exe, cmd.exe, conhost.exe, WindowsTerminal.exe, OpenConsole.exe, wt.exe, mintty.exe, git-bash.exe, python.exe, pythonw.exe, node.exe, npm.exe, yarn.exe, pnpm.exe, bun.exe

; 终端窗口类名 (次优先级)
terminal_classes = ConsoleWindowClass, mintty, PuTTY, WindowsTerminal, CASCADIA_HOSTING_WINDOW_CLASS

; 终端窗口标题关键词 (最低优先级)
terminal_keywords = windowsterminal, powershell, cmd, conemu, terminal, anaconda, anacondaprompt, gitbash, mintty, npm, vscode

; 游戏窗口类型关键词(逗号分隔)
game_keywords = unreal, unity, steam, gog, epic, directx, opengl

; 浏览器进程名
browser_processes = chrome.exe, firefox.exe, msedge.exe, brave.exe, opera.exe, safari.exe

; 浏览器窗口类名
browser_classes = Chrome_WidgetWin_1, MozillaWindowClass, Browser_Server

; 浏览器窗口类型关键词(逗号分隔)
browser_keywords = chrome, firefox, edge, safari, brave

; Office窗口类型关键词(逗号分隔)
office_keywords = winword, excel, powerpoint, outlook

; ==================== 输入方式配置 ====================

; 终端窗口的输入方式: clipboard (剪贴板) 或 sendinput
; 推荐: clipboard (更可靠)
terminal_input_method = clipboard

; 浏览器窗口的输入方式: clipboard (剪贴板) 或 sendinput
; 推荐: clipboard
browser_input_method = clipboard

; 普通窗口的输入方式: clipboard (剪贴板) 或 sendinput
; 推荐: clipboard
normal_input_method = clipboard

; 游戏窗口的输入方式: clipboard 或 sendinput (游戏通常需要sendinput)
game_input_method = sendinput

; Office窗口的输入方式: clipboard 或 sendinput
office_input_method = clipboard

[audio]
; 音频块时长(毫秒)，影响延迟和实时性
; 值越小延迟越低，但网络开销越大
; 推荐值: 50-200
chunk_duration_ms = 100
